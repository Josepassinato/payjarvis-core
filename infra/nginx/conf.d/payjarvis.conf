# ─── Main Server (HTTP — trocar para 443 após SSL) ───
server {
    listen 80;
    server_name your-domain.com www.your-domain.com;

    # SSL (descomentar após certbot):
    # listen 443 ssl;
    # ssl_certificate /etc/letsencrypt/live/payjarvis.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/payjarvis.com/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;

    # ─── Security Headers ───
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── ACME Challenge ───
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ─── API Proxy ───
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ─── Public Endpoints (sem /api prefix) ───
    location /v1/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /.well-known/jwks.json {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_cache_valid 200 1h;
    }

    location /health {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
    }

    location /adapter.js {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_cache_valid 200 1h;
    }

    # ─── SSE (Approvals) ───
    location /api/approvals/stream {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        chunked_transfer_encoding off;
    }

    # ─── Rules Engine (interno, mas exposto para debug) ───
    location /rules/ {
        limit_req zone=api burst=10 nodelay;

        rewrite ^/rules/(.*) /$1 break;
        proxy_pass http://rules_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ─── Web Dashboard (default) ───
    location / {
        limit_req zone=general burst=40 nodelay;

        proxy_pass http://web_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
