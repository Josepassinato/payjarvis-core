version: "3.9"

services:
  # ─── PostgreSQL ───
  postgres:
    image: postgres:16-alpine
    container_name: payjarvis-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: payjarvis
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      POSTGRES_DB: payjarvis
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payjarvis"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis ───
  redis:
    image: redis:7-alpine
    container_name: payjarvis-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-${REDIS_PASSWORD}}
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-${REDIS_PASSWORD}}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── API ───
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: payjarvis-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      API_PORT: "3001"
      DATABASE_URL: "postgresql://payjarvis:${DB_PASSWORD:-${DB_PASSWORD}}@postgres:5432/payjarvis?schema=public"
      DIRECT_URL: "postgresql://payjarvis:${DB_PASSWORD:-${DB_PASSWORD}}@postgres:5432/payjarvis?schema=public"
      REDIS_URL: "redis://default:${REDIS_PASSWORD:-${REDIS_PASSWORD}}@redis:6379"
      RULES_ENGINE_URL: "http://rules-engine:3002"
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      PAYJARVIS_PRIVATE_KEY: ${PAYJARVIS_PRIVATE_KEY}
      PAYJARVIS_PUBLIC_KEY: ${PAYJARVIS_PUBLIC_KEY}
      PAYJARVIS_KEY_ID: ${PAYJARVIS_KEY_ID:-payjarvis-key-2026-03}
      RESEND_API_KEY: ${RESEND_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "com.payjarvis.service=api"

  # ─── Rules Engine ───
  rules-engine:
    build:
      context: .
      dockerfile: apps/rules-engine/Dockerfile
    container_name: payjarvis-rules
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      RULES_ENGINE_PORT: "3002"
      DATABASE_URL: "postgresql://payjarvis:${DB_PASSWORD:-${DB_PASSWORD}}@postgres:5432/payjarvis?schema=public"
      DIRECT_URL: "postgresql://payjarvis:${DB_PASSWORD:-${DB_PASSWORD}}@postgres:5432/payjarvis?schema=public"
      REDIS_URL: "redis://default:${REDIS_PASSWORD:-${REDIS_PASSWORD}}@redis:6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "com.payjarvis.service=rules-engine"

  # ─── Web Dashboard ───
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: payjarvis-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
    depends_on:
      - api
    labels:
      - "com.payjarvis.service=web"

  # ─── Nginx Reverse Proxy ───
  nginx:
    image: nginx:alpine
    container_name: payjarvis-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./infra/certbot/conf:/etc/letsencrypt:ro
      - ./infra/certbot/www:/var/www/certbot:ro
    depends_on:
      - api
      - web
      - rules-engine

  # ─── Certbot (SSL) ───
  certbot:
    image: certbot/certbot
    container_name: payjarvis-certbot
    volumes:
      - ./infra/certbot/conf:/etc/letsencrypt
      - ./infra/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
