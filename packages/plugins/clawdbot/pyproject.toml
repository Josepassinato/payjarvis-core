[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "payjarvis-clawdbot"
version = "0.1.0"
description = "PayJarvis financial guardrails plugin for Clawdbot agents"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [
    {name = "PayJarvis", email = "dev@payjarvis.com"},
]
keywords = ["ai-agents", "fintech", "guardrails", "trust", "clawdbot", "payjarvis"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "httpx>=0.25.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
    "respx>=0.21",
]

[project.urls]
Homepage = "https://payjarvis.com"
Repository = "https://github.com/Josepassinato/Payjarvis"
Documentation = "https://docs.payjarvis.com/plugins/clawdbot"

[tool.setuptools.packages.find]
include = ["payjarvis_clawdbot*"]
