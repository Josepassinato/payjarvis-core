# Docker Compose for local development
# Provides PostgreSQL and Redis only — run Node apps locally with `npm run dev`
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   cp .env.example .env  # DATABASE_URL already points to localhost:5432
#   npm install && npm run db:generate && npx --workspace=packages/database prisma db push
#   npm run dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: payjarvis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: payjarvis
      POSTGRES_PASSWORD: payjarvis
      POSTGRES_DB: payjarvis
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payjarvis"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: payjarvis-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
